<!DOCTYPE html>
<html>
<head>
    <title>Banking Application</title>
    <link rel="stylesheet" href="bank.css">
</head>
<body>

<h1>Banking Application</h1>

<div class="menu">
    <a href="#">ACCOUNT</a>
    <a href="#">PROFILE</a>
    <a href="#">LOGOUT</a>
</div>

<div class="buttons">
    <button onclick="showWithdraw()">Withdraw</button>
    <button onclick="showDeposit()">Deposit</button>
    <button onclick="showSummary()">Summary</button>
</div>

<!-- ADD ACCOUNT -->
<div id="accountSection" class="box">
    <h3>Add Account</h3>

    <label>Account Number:</label><br>
    <input type="text" id="accNumber"><br><br>

    <label>Bank Name:</label><br>
    <input type="text" id="bankName"><br><br>

    <label>IFSC Code:</label><br>
    <input type="text" id="ifsc"><br><br>

    <button onclick="addAccount()">Submit</button>
</div>

<!-- WITHDRAW -->
<div id="withdrawSection" class="box" style="display:none;">
    <h3>Withdraw</h3>

    <p><b>Account Number:</b> <span id="withdrawAcc"></span></p>
    <p><b>Available Balance:</b> ₹<span id="balance">0</span></p>

    <label>Amount:</label><br>
    <input type="number" id="withdrawAmount"><br><br>

    <button onclick="withdraw()">Submit</button>
    <button onclick="goBack()">Go Back</button>
    <button onclick="editAccount()">Edit Account</button>
</div>

<!-- DEPOSIT -->
<div id="depositSection" class="box" style="display:none;">
    <h3>Deposit</h3>

    <p><b>Account Number:</b> <span id="depositAcc"></span></p>
    <p><b>Available Balance:</b> ₹<span id="balance2">0</span></p>

    <label>Amount:</label><br>
    <input type="number" id="depositAmount"><br><br>

    <button onclick="deposit()">Submit</button>
    <button onclick="goBack()">Go Back</button>
    <button onclick="editAccount()">Edit Account</button>
</div>

<!-- SUMMARY -->
<div id="summarySection" class="box" style="display:none;">
    <h3>Account Summary</h3>

    <p><b>Account Number:</b> <span id="summaryAcc"></span></p>
    <p><b>Current Balance:</b> ₹<span id="summaryBalance">0</span></p>

    <h4>Transaction History</h4>

    <table border="1" width="100%" id="historyTable">
        <tr>
            <th>Type</th>
            <th>Amount</th>
        </tr>
    </table>

    <br>
    <button onclick="goBack()">Go Back</button>
    <button onclick="editAccount()">Edit Account</button>
</div>

<script src="bank.js"></script>
</body>
</html>
